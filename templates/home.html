<!DOCTYPE html>
<html>
<head>
    <title>Medicine Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

   
    <div class="navbar">

    <h2>🏥 MediCare</h2>

    <div class="navbar">

    <a href="/">Home</a>

    <a href="/about">About</a>

    <a href="/contact">Contact</a>

    <a href="/admin">Admin</a>

    <a href="/view_medicines">View Medicines</a>

</div>

</div>

<div class="container">

    <h1>🏥 Smart Medicine Recommendation System</h1>

    <p>Search your health problem and get recommended medicines.</p>

    <form action="/search" method="POST">

       <input
    type="text"
    id="problem"
    name="problem"
    list="symptoms"
    placeholder="Enter your problem"
    required>

<datalist id="symptoms">
</datalist>

<script>
fetch('/get_symptoms')
.then(response => response.json())
.then(data => {

    const list = document.getElementById("symptoms");

    data.symptoms.forEach(function(symptom){

        const option = document.createElement("option");
        option.value = symptom;

        list.appendChild(option);

    });

});
</script>

<script>

const input = document.getElementById("problem");
const suggestions = document.getElementById("suggestions");

input.addEventListener("keyup", function(){

    let text = input.value;

    if(text.length == 0){

        suggestions.innerHTML = "";
        return;

    }

    fetch("/search_suggestions?q=" + text)

    .then(response => response.json())

    .then(data => {

        suggestions.innerHTML = "";

        data.results.forEach(function(item){

            let div = document.createElement("div");

            div.innerHTML = item;

            div.style.padding = "8px";
            div.style.cursor = "pointer";
            div.style.borderBottom = "1px solid #ddd";

            div.onclick = function(){

                input.value = item;
                suggestions.innerHTML = "";

            };

            suggestions.appendChild(div);

        });

    });

});

</script>

<datalist id="symptoms">

    <option value="fever">
    <option value="cold">
    <option value="cough">
    <option value="headache">
    <option value="body pain">
    <option value="knee pain">
    <option value="back pain">
    <option value="leg pain">
    <option value="neck pain">
    <option value="joint pain">
    <option value="muscle pain">
    <option value="tooth pain">
    <option value="ear pain">
    <option value="acidity">
    <option value="stomach pain">
    <option value="allergy">
    <option value="sore throat">
    <option value="vomiting">
    <option value="diarrhea">

</datalist>

        <br>

        <button type="submit">
            Search Medicine
        </button>
        <br><br>

<a href="/view_medicines">

<button>

View All Medicines

</button>

</a>

    </form>

</div>

<footer>

<p>

© 2026 Smart Medicine Recommendation System

</p>

</footer>

</body>
</html>
